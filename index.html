<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewatee.com</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Background layers -->
    <div class="bg"></div>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>
    <canvas id="particles"></canvas>

    <!-- Corner brackets -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="status-line"></div>

    <!-- ── Main Scene ── -->
    <div id="scene">
        <div class="logo-wrap">
            <canvas id="c"></canvas>
        </div>
        <button class="btn-dashboard" id="btnDash" onclick="openModal()">
            <span class="bc tl"></span>
            <span class="bc tr"></span>
            <span class="bc bl"></span>
            <span class="bc br"></span>
            Dashboard
        </button>
    </div>

    <!-- ── Password Modal ── -->
    <div class="overlay" id="overlay">
        <div class="modal">
            <div class="mc tl"></div><div class="mc tr"></div>
            <div class="mc bl"></div><div class="mc br"></div>

            <div class="modal-label">Access Required</div>
            <div class="modal-hint">Enter authorization code to continue</div>
            <div class="modal-icon">⬡</div>

            <div class="pin-dots">
                <div class="pin-dot" id="d0"></div>
                <div class="pin-dot" id="d1"></div>
                <div class="pin-dot" id="d2"></div>
                <div class="pin-dot" id="d3"></div>
                <div class="pin-dot" id="d4"></div>
                <div class="pin-dot" id="d5"></div>
            </div>

            <input
                type="password"
                id="pwInput"
                class="pw-input"
                maxlength="20"
                autocomplete="off"
                placeholder="••••••"
                oninput="onInput()"
                onkeydown="onKey(event)"
            />
            <div class="modal-err" id="modalErr">INVALID CODE — ACCESS DENIED</div>

            <div class="modal-btns">
                <button class="mbtn mbtn-cancel" onclick="closeModal()">Cancel</button>
                <button class="mbtn mbtn-enter"  onclick="submitPw()">Enter</button>
            </div>
        </div>
    </div>

    <!-- ── Dashboard ── -->
    <div id="dashboard">
        <div class="dash-header">
            <div>
                <div class="dash-brand">Mewatee <span>// Control Panel</span></div>
                <div class="dash-user" id="dashUser"></div>
            </div>
            <button class="btn-lock" onclick="lockDash()">⬡ Lock</button>
        </div>

        <div class="dash-body">

            <!-- Mission Control -->
            <div class="section-label">Quick Access</div>
            <a class="btn-mission" href="https://owa-mission.vercel.app/tasks" target="_blank" rel="noopener">
                <span class="mc-icon">⊕</span>
                Mission Control
                <span class="mc-arrow">→</span>
            </a>

            <!-- Stats -->
            <div class="section-label">Overview</div>
            <div class="cards">
                <div class="card">
                    <div class="card-dot"></div>
                    <div class="card-lbl">Status</div>
                    <div class="card-val" style="font-size:15px;letter-spacing:2px;">ONLINE</div>
                    <div class="card-sub">All systems operational</div>
                </div>
                <div class="card">
                    <div class="card-lbl">Version</div>
                    <div class="card-val">1.0</div>
                    <div class="card-sub">Current build</div>
                </div>
                <div class="card">
                    <div class="card-lbl">Domain</div>
                    <div class="card-val" style="font-size:14px;letter-spacing:1px;">mewatee.com</div>
                    <div class="card-sub">Active</div>
                </div>
                <div class="card">
                    <div class="card-lbl">Uptime</div>
                    <div class="card-val" id="uptimeVal">—</div>
                    <div class="card-sub">Since session start</div>
                </div>
            </div>

            <!-- Activity log -->
            <div class="section-label">Activity Log</div>
            <div class="activity-log" id="actLog"></div>

        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
